# blog.aisolution.uz — reverse proxy to the aisolution-blog PM2 process on :3001.
# Install: copy to /etc/nginx/sites-available/blog.aisolution.uz,
# symlink into sites-enabled, then: certbot --nginx -d blog.aisolution.uz
#
# Does NOT touch the aisolution (main site, :3000) or aisolution-crm (:8000)
# processes or their Nginx blocks — see nginx-crm.conf for that config.

server {
    listen 443 ssl http2;
    server_name blog.aisolution.uz;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name blog.aisolution.uz;
    return 301 https://$host$request_uri;
}
