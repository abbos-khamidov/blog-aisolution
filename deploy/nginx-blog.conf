# blog.aisolution.uz — reverse proxy to the aisolution-blog PM2 process on :3002.
# Install: copy to /etc/nginx/sites-available/blog.aisolution.uz,
# symlink into sites-enabled, then: certbot --nginx -d blog.aisolution.uz
#
# Does NOT touch the aisolution (main site, :3000) or aisolution-crm (:8000)
# processes or their Nginx blocks — see nginx-crm.conf for that config.

server {
    listen 443 ssl http2;
    server_name blog.aisolution.uz;

    ssl_certificate /etc/letsencrypt/live/blog.aisolution.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.aisolution.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location /_next/ {
        proxy_pass http://127.0.0.1:3002/_next/;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name blog.aisolution.uz;
    return 301 https://$host$request_uri;
}
