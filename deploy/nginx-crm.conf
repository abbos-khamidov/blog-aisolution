# crm.aisolution.uz — REFERENCE ONLY. The CRM itself lives in a separate
# repo/deployment; this file exists here purely so the noindex requirement
# from claude.md (hard rule #1) is documented next to the blog's own Nginx
# config. Do not deploy this from the blog repo — copy into the CRM's own
# ops config and keep it in sync there.
#
# CRM is an internal system with an append-only audit log and ownership
# enforcement — indexing it would leak API/login endpoint structure.

server {
    listen 443 ssl http2;
    server_name crm.aisolution.uz;

    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
